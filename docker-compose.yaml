services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: digital_hunter
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./dump.sql:/docker-entrypoint-initdb.d/dump.sql
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: digital_hunter_api
    ports:
      - "8000:8000"
    environment:
      - DB_HOST= mysql
      - DB_USER= root
      - DB_PASSWORD= root
      - DB_NAME= digital_hunter


volumes:
  mysql_data:
